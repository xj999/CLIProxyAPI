services:
  cli-proxy-api:
    image: ${CLI_PROXY_IMAGE:-cli-proxy-api:local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDER_IMAGE: ${CLI_PROXY_BUILDER_IMAGE:-m.daocloud.io/docker.io/library/golang:1.26-alpine}
        RUNTIME_IMAGE: ${CLI_PROXY_RUNTIME_IMAGE:-m.daocloud.io/docker.io/library/alpine:3.22.0}
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: cli-proxy-api
    # env_file:
    #   - .env
    environment:
      DEPLOY: ${DEPLOY:-}
      MANAGEMENT_STATIC_PATH: /CLIProxyAPI/static
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      - ${CLI_PROXY_CONFIG_PATH:-./config.yaml}:/CLIProxyAPI/config.yaml
      - ${CLI_PROXY_AUTH_PATH:-./auths}:/root/.cli-proxy-api
      - ${CLI_PROXY_LOG_PATH:-./logs}:/CLIProxyAPI/logs
      - ${CLI_PROXY_STATIC_PATH:-./static}:/CLIProxyAPI/static
    restart: unless-stopped
